# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=jwtauth

# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ===================================
# DATABASE CONFIGURATION
# ===================================
# Environment variables are loaded from .env file
# Use: export $(cat .env | grep -v '^#' | xargs) before running

# Database Connection (supports both PostgreSQL and H2)
# Spring Boot auto-detects driver from URL
spring.datasource.url=${DB_URL:jdbc:h2:mem:jwtauthdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console - Enable web console for database access
# Access at: http://localhost:8080/api/h2-console
# JDBC URL: jdbc:h2:mem:jwtauthdb
# Username: sa
# Password: (leave blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
# create-drop: Drops and recreates schema on startup (good for H2 development)
# update: Updates schema without dropping (good for PostgreSQL)
# validate: Only validates schema (production)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# ===================================
# GOOGLE OAUTH CONFIGURATION
# ===================================
# Custom properties bound via @ConfigurationProperties in ApplicationProperties.java
# Metadata available in META-INF/spring-configuration-metadata.json
# Get credentials from: https://console.cloud.google.com/apis/credentials
app.google.oauth.client-id=${GOOGLE_CLIENT_ID}
app.google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
app.google.oauth.token-url=https://oauth2.googleapis.com/token
app.google.oauth.user-info-url=https://www.googleapis.com/oauth2/v3/userinfo
app.google.oauth.authorization-url=https://accounts.google.com/o/oauth2/v2/auth
app.google.oauth.scope=openid email profile
app.google.oauth.access-type=offline
app.google.oauth.prompt=consent

# ===================================
# JWT CONFIGURATION
# ===================================
# We'll generate RSA keys programmatically for now
# In production, use external key files
app.jwt.access-token-expiry-days=${JWT_ACCESS_TOKEN_EXPIRY_DAYS:1}
app.jwt.refresh-token-expiry-days=${JWT_REFRESH_TOKEN_EXPIRY_DAYS:30}

# ===================================
# SECURITY CONFIGURATION
# ===================================
app.security.allowed-email-domains=${ALLOWED_EMAIL_DOMAINS:gmail.com}
app.security.dev-auth-enabled=${DEV_AUTH_ENABLED:true}
app.security.developer-emails=${DEVELOPER_EMAILS:developer@gmail.com}

# CORS Configuration
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.security.cors.max-age=3600

# Cookie Configuration
app.security.cookie.secure=false
app.security.cookie.same-site=Lax

# ===================================
# LOGGING CONFIGURATION
# ===================================
logging.level.com.jwtauth=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
